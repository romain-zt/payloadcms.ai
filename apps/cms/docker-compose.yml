services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payloadcms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host 5433 avoids conflict with a local Postgres on 5432
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d payloadcms"]
      interval: 5s
      timeout: 5s
      retries: 10

  cms:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URI: postgresql://payload:payload@postgres:5432/payloadcms
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-change-me-in-production}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_ENABLED: ${AI_ENABLED:-true}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
